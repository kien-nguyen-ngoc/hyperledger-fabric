name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          track_progress: true
          prompt: |
            REPO:${{ github.repository }} PR:#${{ github.event.pull_request.number }}
            Stack: .NET Core/C#, SQL Server. Domain: PCI-DSS payment platform (POS/QR/SoftPOS).

            Severity: 🔴CRITICAL(block merge) 🟠HIGH(fix soon) 🟡MEDIUM(follow-up) 🔵LOW(suggestion)

            RULES:
            SQL: 🔴 UPDATE missing audit fields(updated_at,updated_by,version) | no WHERE | string concat
                🟠 Missing BEGIN TRAN/COMMIT | status field gaps on state transitions | N+1 loops
            SEC: 🔴 PAN/CVV/track plaintext | secrets hardcoded | sensitive data in logs | no input validation
                🟠 Missing auth checks | OWASP Top10 | stack trace exposed to client
            PAY: 🔴 No idempotency key | float/double for amounts(use decimal) | race condition on balance
                🟠 No timeout on Cybersource/Visa calls | missing retry+backoff | invalid status transitions
            C#:  🔴 Unhandled exceptions | 🟠 .Result/.Wait()/async void | missing null checks | unclosed IDisposable
            PERF:🟠 Sync I/O | missing pagination | 🟡 repeated DB calls | unbounded LINQ eval
            TEST:🟠 New payment logic with no tests | missing edge cases(null,zero,timeout,duplicate)
            DOCS:🟡 Public API/SP with no comment | missing README update for new features

            OUTPUT:
            1. Top-level summary: verdict(1 sentence) | counts(🔴/🟠/🟡/🔵) | ✅Approve/⚠️Fix/🚫Block | list all 🔴
            2. Inline per finding: `🔴 SQL — [issue] → [fix]` (3 lines max)
            
            CONSTRAINTS: No praise-only comments. Consolidate duplicate patterns. English terms only.

          # Tools for comprehensive PR review
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --model claude-sonnet-4-5

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Optional: Configure Claude's behavior with CLI arguments
          # claude_args: |
          #   --model claude-haiku-4-5-20251001
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*)"
          #   --system-prompt "Follow our coding standards. Ensure all new code has tests. Use TypeScript for new files."

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
